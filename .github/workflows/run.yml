name: AI Running Coach

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  coach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Coach
        run: python coach.py
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

      - name: Commit Profile
        run: |
          git config --global user.name "ai-coach"
          git config --global user.email "ai@coach.com"
          git add data/ || true
          git commit -m "update athlete profile" || true
          git push || true
