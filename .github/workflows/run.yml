name: AI Running Coach

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: |
          pip install garminconnect openai

      - name: Run coach
        run: python coach.py
